name: iOS Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: List Available Simulators
        run: xcrun simctl list devices available

      - name: Build App
        run: |
          # Dynamically find the first available iPhone simulator
          DEST=$(xcrun simctl list devices available | grep -m 1 "iPhone" | sed -E 's/.* \(([-0-9A-F]+)\) \(Available\)/id=\1/')
          echo "Building for destination: $DEST"
          
          xcodebuild clean build \
            -project "Dadi Flight App.xcodeproj" \
            -scheme "Dadi Flight App" \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
